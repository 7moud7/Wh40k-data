.menu-bg::before{content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(0,0,0,.65) 0%,rgba(0,0,0,0) 30%,rgba(0,0,0,0) 50%,rgba(0,0,0,.92) 100%)}
.menu-title-area{position:relative;z-index:2;text-align:center;
  padding-top:max(56px,env(safe-area-inset-top,56px))}
.menu-eyebrow{font-size:10px;letter-spacing:5px;font-weight:700;color:var(--gold);
  text-transform:uppercase;margin-bottom:6px}
.menu-title{font-size:clamp(32px,9vw,60px);font-weight:900;color:#fff;
  text-transform:uppercase;letter-spacing:2px;line-height:.95;
  text-shadow:0 0 60px rgba(245,196,0,.4),0 4px 20px rgba(0,0,0,.9)}
.menu-sub{font-size:clamp(16px,4.5vw,24px);color:var(--gold);
  letter-spacing:8px;text-transform:uppercase;margin-top:4px}
.menu-divider{width:100px;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);margin:12px auto 0}
.menu-badge-area{position:relative;z-index:2}
.menu-badge{background:rgba(0,0,0,.7);border:1px solid var(--goldborder);
  border-radius:2px;padding:6px 18px;font-size:10px;letter-spacing:3px;
  color:var(--gold);text-transform:uppercase;font-weight:700;backdrop-filter:blur(8px)}
.menu-bottom{position:relative;z-index:2;width:100%;
  padding-bottom:max(0px,env(safe-area-inset-bottom,0px))}
.menu-navline{width:100%;height:1px;background:linear-gradient(to right,transparent,rgba(245,196,0,.3),transparent)}
.menu-nav{display:grid;grid-template-columns:1fr 1.4fr 1fr;
  background:rgba(0,0,0,.85);backdrop-filter:blur(20px)}
.nav-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:5px;padding:18px 8px 20px;color:#555;transition:color .15s}
.nav-btn:active{color:var(--gold);background:rgba(245,196,0,.06)}
.nav-btn.center{color:var(--gold);background:rgba(245,196,0,.04);
  border-left:1px solid rgba(245,196,0,.1);border-right:1px solid rgba(245,196,0,.1);position:relative}
.nav-btn.center::before{content:'';position:absolute;top:0;left:10%;right:10%;height:2px;
  background:linear-gradient(to right,transparent,var(--gold),transparent)}
.nav-icon{font-size:20px;line-height:1}
.nav-btn.center .nav-icon{font-size:26px;filter:drop-shadow(0 0 10px rgba(245,196,0,.7))}
.nav-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.nav-btn.center .nav-label{color:var(--gold)}
@keyframes ember{0%{transform:translateY(0) scale(1);opacity:.9}100%{transform:translateY(-100px) translateX(var(--dx)) scale(0);opacity:0}}
.ember{position:absolute;width:2px;height:2px;background:var(--gold);border-radius:50%;
  animation:ember var(--dur) ease-out infinite;animation-delay:var(--delay);
  bottom:22%;left:var(--x);z-index:1;box-shadow:0 0 6px var(--gold)}

/* ── APP SHELL ── */
.app{position:fixed;inset:0;background:var(--bg0);display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:20}
.app.open{transform:translateX(0)}

/* ── TOPBAR ── */
.topbar{background:var(--bg1);border-bottom:1px solid var(--border);
  padding:0 16px;display:flex;align-items:center;gap:10px;
  height:56px;padding-top:env(safe-area-inset-top,0);
  flex-shrink:0;position:relative}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(to right,transparent,var(--goldborder),transparent)}
.topbar-title{font-size:13px;font-weight:800;letter-spacing:2px;color:var(--text);
  text-transform:uppercase;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;padding:16px;width:100%;max-width:600px;margin:0 auto}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:10px 16px;border-radius:var(--radius);font-size:12px;font-weight:700;
  letter-spacing:.5px;text-transform:uppercase;border:1px solid transparent;
  transition:opacity .15s}
.btn:active{opacity:.7}
.btn-gold{background:var(--gold);color:#000}
.btn-outline{border-color:var(--border);color:var(--text2)}
.btn-ghost{color:var(--text3)}
.btn-danger{border-color:#ff444440;color:#ff6666;background:rgba(255,68,68,.06)}
.btn-sm{padding:6px 12px;font-size:11px}
.btn-xs{padding:4px 8px;font-size:10px}
.btn-icon{width:36px;height:36px;padding:0;border-radius:var(--radius);
  border-color:var(--border);color:var(--text2)}

/* ── SECTION HEADER ── */
.section-header{display:flex;align-items:center;justify-content:space-between;
  padding:14px 0 8px;border-bottom:1px solid var(--border);margin-bottom:8px}
.section-header-title{font-size:11px;font-weight:800;letter-spacing:2px;
  color:var(--text2);text-transform:uppercase}
.section-label{font-size:10px;font-weight:700;letter-spacing:1.5px;
  color:var(--text3);text-transform:uppercase;margin:14px 0 8px}

/* ── FACTION CARDS ── */
.faction-list{display:flex;flex-direction:column;gap:6px}
.faction-card{position:relative;height:64px;border-radius:var(--radius);
  overflow:hidden;cursor:pointer;border:1px solid var(--border);
  display:flex;align-items:center;padding:0 14px;gap:12px;
  background:var(--bg2)}
.faction-card:active{border-color:var(--gold)}
.faction-card-icon{font-size:22px;flex-shrink:0;z-index:1}
.faction-card-name{font-size:14px;font-weight:800;letter-spacing:.5px;
  text-transform:uppercase;color:var(--text);z-index:1;flex:1}
.faction-card-sub{font-size:10px;color:var(--text3);z-index:1}
.faction-card-chevron{color:var(--text3);font-size:12px;z-index:1}

/* ── DETACHMENT CARDS ── */
.det-card{background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);margin-bottom:8px;overflow:hidden;cursor:pointer}
.det-card:active{border-color:var(--gold)}
.det-card-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.det-card-name{font-size:14px;font-weight:800;letter-spacing:.5px;text-transform:uppercase}
.det-card-meta{font-size:10px;color:var(--text3);margin-top:4px;letter-spacing:.5px}

/* ── ARMY HEADER ── */
.army-header{background:var(--bg1);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px;margin-bottom:14px;
  border-top:2px solid var(--gold)}
.pts-bar{height:4px;background:var(--bg3);border-radius:2px;margin-top:10px;overflow:hidden}
.pts-fill{height:100%;border-radius:2px;transition:width .3s}
.pts-badge{background:var(--gold);color:#000;padding:3px 10px;
  border-radius:2px;font-size:11px;font-weight:800;letter-spacing:.5px}

/* ── UNIT ROLE GROUPS ── */
.role-group{margin-bottom:16px}
.role-group-header{display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);margin-bottom:6px;cursor:pointer}
.role-group-title{font-size:11px;font-weight:800;letter-spacing:2px;
  text-transform:uppercase;color:var(--text)}
.role-group-count{font-size:10px;color:var(--text3)}

/* ── UNIT CARDS (army list) ── */
.unit-card{background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);margin-bottom:6px;overflow:hidden}
.unit-card.warlord{border-top:2px solid var(--gold)}
.unit-card.attached{border-left:3px solid #4499ff}
.unit-card-header{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.unit-name{font-size:14px;font-weight:700;color:var(--text);flex:1}
.unit-card-body{padding:12px 14px;border-top:1px solid var(--border)}

/* ── UNIT CARDS (browser) ── */
.browser-unit-card{background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);margin-bottom:6px;overflow:hidden;cursor:pointer;
  display:flex;align-items:center;padding:12px 14px;gap:12px}
.browser-unit-card:active{border-color:var(--gold);background:var(--bg3)}
.browser-unit-info{flex:1;min-width:0}
.browser-unit-name{font-size:14px;font-weight:700;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.browser-unit-meta{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;align-items:center}
.add-btn{width:38px;height:38px;border-radius:var(--radius);border:2px solid var(--gold);
  color:var(--gold);font-size:20px;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-weight:300}
.add-btn:active{background:var(--gold);color:#000}

/* ── TAGS ── */
.tag{display:inline-block;padding:2px 8px;border-radius:2px;font-size:9px;
  font-weight:800;letter-spacing:.8px;text-transform:uppercase}
.tag-gold{background:rgba(245,196,0,.15);color:var(--gold);border:1px solid rgba(245,196,0,.2)}
.tag-blue{background:rgba(68,153,255,.12);color:#6aadff;border:1px solid rgba(68,153,255,.2)}
.tag-purple{background:rgba(170,100,255,.12);color:#bb88ff;border:1px solid rgba(170,100,255,.2)}
.tag-green{background:rgba(80,200,100,.12);color:#66cc80;border:1px solid rgba(80,200,100,.2)}
.tag-red{background:rgba(255,80,80,.12);color:#ff7777;border:1px solid rgba(255,80,80,.2)}
.tag-grey{background:var(--bg3);color:var(--text3);border:1px solid var(--border)}

/* ── ROLE BADGE ── */
.role-badge{font-size:9px;padding:2px 7px;border-radius:2px;font-weight:800;
  text-transform:uppercase;letter-spacing:.5px}
.role-Character{background:rgba(170,100,255,.15);color:#bb88ff}
.role-Battleline{background:rgba(68,153,255,.15);color:#6aadff}
.role-Other,.role-Infantry{background:var(--bg3);color:var(--text3)}
.role-Monster,.role-Vehicle{background:rgba(204,120,50,.15);color:#cc7733}
.role-Dedicated\ Transport{background:rgba(80,200,100,.12);color:#66cc80}

/* ── STAT BLOCK ── */
.stat-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin:10px 0}
.stat-cell{background:var(--bg3);border:1px solid var(--border);border-radius:4px;
  padding:6px 4px;text-align:center}
.stat-cell .sk{font-size:8px;color:var(--text3);font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.stat-cell .sv{font-size:16px;font-weight:800;color:var(--text);margin-top:2px}

/* ── WEAPON TABLE ── */
.weapon-section{margin-top:12px}
.weapon-type-label{font-size:9px;font-weight:800;letter-spacing:2px;color:var(--gold);
  text-transform:uppercase;padding:6px 0 4px;border-bottom:1px solid var(--goldborder)}
.weapon-row{display:grid;grid-template-columns:1.6fr 44px 34px 34px 34px 34px 34px;
  gap:2px;padding:5px 0;border-bottom:1px solid var(--border);align-items:center;font-size:11px}
.weapon-row.hdr{color:var(--text3);font-weight:700;font-size:9px;letter-spacing:.5px}
.weapon-name{color:var(--text);font-weight:600}
.weapon-ability-row{font-size:10px;color:var(--text3);padding:3px 0;grid-column:1/-1;
  border-bottom:1px solid var(--border);font-style:italic}

/* ── ABILITY BUBBLE ── */
.ability-bubble{background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--radius);padding:10px 12px;margin-bottom:5px;cursor:pointer;
  transition:border-color .15s}
.ability-bubble:active,.ability-bubble.open{border-color:var(--gold)}
.ability-bubble-header{display:flex;justify-content:space-between;align-items:center}
.ability-bubble-name{font-size:12px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.5px}
.ability-bubble-body{font-size:12px;color:var(--text2);margin-top:8px;line-height:1.6;
  border-top:1px solid var(--border);padding-top:8px}

/* ── STRATAGEM CARD ── */
.strat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  padding:12px 14px;margin-bottom:6px;cursor:pointer;transition:border-color .15s}
.strat-card:active{border-color:var(--gold)}
.strat-card.your-turn{border-left:3px solid #4488ff}
.strat-card.opp-turn{border-left:3px solid #ff4444}
.strat-card.either{border-left:3px solid #44cc66}
.strat-card-body{font-size:12px;color:var(--text2);line-height:1.6;margin-top:10px;
  border-top:1px solid var(--border);padding-top:10px}

/* ── TABS ── */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:14px;flex-shrink:0}
.tab{padding:12px 16px;font-size:11px;font-weight:800;color:var(--text3);cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;letter-spacing:1px;text-transform:uppercase;
  transition:color .15s}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;
  display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--bg1);border-top:2px solid var(--gold);
  border-radius:12px 12px 0 0;width:100%;max-width:600px;
  max-height:90vh;overflow-y:auto;padding:20px 16px;
  padding-bottom:max(20px,env(safe-area-inset-bottom,20px))}
.modal-title{font-size:16px;font-weight:800;text-transform:uppercase;letter-spacing:1px;
  color:var(--text);margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--text3);margin-bottom:16px}

/* ── LOADING ── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;padding:60px 20px;color:var(--text3)}
.spinner{width:32px;height:32px;border:2px solid var(--border);
  border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── ERROR ── */
.error-box{background:var(--reddim);border:1px solid rgba(139,26,26,.5);
  border-radius:var(--radius);padding:10px 14px;color:#ff8888;font-size:12px;margin-bottom:12px}

/* ── EMPTY ── */
.empty{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:10px}

/* ── ARMY ROWS (list) ── */
.army-row{background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;
  cursor:pointer;display:flex;align-items:center;gap:12px;
  transition:border-color .15s}
.army-row:active{border-color:var(--gold)}

/* ── SEARCH ── */
.search-wrap{position:relative;margin-bottom:10px}
.search-wrap input{padding-left:38px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);
  color:var(--text3);font-size:15px;pointer-events:none}

/* ── FILTER CHIPS ── */
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.chip{padding:5px 12px;font-size:10px;font-weight:700;letter-spacing:.5px;
  text-transform:uppercase;border:1px solid var(--border);border-radius:20px;
  color:var(--text3);cursor:pointer;background:none;transition:all .15s}
.chip.active{border-color:var(--gold);color:var(--gold);background:rgba(245,196,0,.08)}

/* ── SIZE BTNS ── */
.size-select{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.size-btn{padding:6px 12px;font-size:11px;font-weight:700;letter-spacing:.5px;
  text-transform:uppercase;border:1px solid var(--border);border-radius:var(--radius);
  color:var(--text3);cursor:pointer;background:none}
.size-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(245,196,0,.08)}

/* ── BUNKER PHASE BAR ── */
.phase-bar{background:var(--bg1);border-bottom:1px solid var(--border);
  padding:8px 14px;display:flex;gap:4px;overflow-x:auto;flex-shrink:0}
.phase-btn{display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:8px 12px;border-radius:var(--radius);border:1px solid var(--border);
  flex-shrink:0;cursor:pointer;transition:all .15s;background:none;min-width:60px}
.phase-btn.active{border-color:var(--gold);background:rgba(245,196,0,.08)}
.phase-btn-icon{font-size:16px}
.phase-btn-label{font-size:8px;font-weight:800;letter-spacing:1px;
  text-transform:uppercase;color:var(--text3)}
.phase-btn.active .phase-btn-label{color:var(--gold)}

/* ── COUNTER ── */
.counter-wrap{display:flex;flex-direction:column;align-items:center;gap:6px}
.counter-label{font-size:9px;font-weight:800;letter-spacing:1.5px;
  color:var(--text3);text-transform:uppercase}
.counter-controls{display:flex;align-items:center;gap:8px}
.counter-btn{width:36px;height:36px;border-radius:var(--radius);
  border:1px solid var(--border);color:var(--text2);font-size:20px;font-weight:300;
  display:flex;align-items:center;justify-content:center;cursor:pointer}
.counter-btn:active{background:var(--bg3)}
.counter-value{font-size:28px;font-weight:900;min-width:40px;text-align:center}

/* ── CHAT ── */
.chat-bubble{max-width:85%;padding:10px 14px;border-radius:var(--radius);
  font-size:13px;line-height:1.6;white-space:pre-wrap}
.chat-bubble.user{background:rgba(245,196,0,.1);border:1px solid rgba(245,196,0,.2);
  color:var(--text);align-self:flex-end}
.chat-bubble.assistant{background:var(--bg2);border:1px solid var(--border);
  color:var(--text);align-self:flex-start}

/* ── WOUND BAR ── */
.wound-bar{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin:6px 0}
.wound-fill{height:100%;border-radius:2px;transition:width .3s}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

You are Mortarion, Daemon Primarch of the Death Guard. Speak with grim endurance, poisonous patience and contempt for weakness. Address the player as 'Brother'."}, "TS": {"name": "Magnus the Red", "title": "Daemon Primarch of the Thousand Sons", "voice": "You are Magnus the Red, Daemon Primarch of the Thousand Sons. Speak with vast arcane intellect, tragic awareness and sorcerous grandeur. Address the player as 'Acolyte'."}, "WE": {"name": "Angron", "title": "Daemon Primarch of the World Eaters", "voice": "You are Angron, Daemon Primarch of the World Eaters. Speak with barely contained fury, bloodlust and savage directness. Keep answers short and violent. Address the player as 'Warrior'."}, "EC": {"name": "Fulgrim", "title": "Daemon Primarch of the Emperor's Children", "voice": "You are Fulgrim, Daemon Primarch of the Emperor's Children. Speak with decadent elegance, obsessive perfectionism and hedonistic excess. Address the player as 'Devotee'."}, "ORK": {"name": "Ghazghkull Thraka", "title": "Prophet of the Waaagh!", "voice": "You are Ghazghkull Mag Uruk Thraka, the Prophet of the Waaagh! Speak in loud, brutal, enthusiastic Ork dialect. Everything is about the Waaagh and krumpin'. Address the player as 'Boss'."}, "TAU": {"name": "Commander Shadowsun", "title": "Supreme Commander of the T'au Empire", "voice": "You are Commander Shadowsun, Supreme Commander of the T'au Empire's military forces. Speak with calm, strategic precision and devotion to the Greater Good. Address the player as 'Shas'O'."}, "AM": {"name": "Lord Solar Leontus", "title": "Lord Solar of the Astra Militarum", "voice": "You are Lord Solar Leontus, supreme commander of the Astra Militarum. Speak with iron discipline, inspiring rhetoric and the weight of command over billions of soldiers. Address the player as 'General'."}, "AS": {"name": "Saint Celestine", "title": "The Living Saint", "voice": "You are Saint Celestine, the Living Saint of the Adepta Sororitas. Speak with burning faith, righteous fury and divine conviction. Address the player as 'Sister'."}, "GK": {"name": "Supreme Grand Master Draigo", "title": "Supreme Grand Master of the Grey Knights", "voice": "You are Kaldor Draigo, Supreme Grand Master of the Grey Knights, trapped in the warp but unbowed. Speak with iron will, daemonic knowledge and unbreakable faith. Address the player as 'Battle-Brother'."}, "AdM": {"name": "Belisarius Cawl", "title": "Archmagos Dominus", "voice": "You are Belisarius Cawl, Archmagos Dominus of the Adeptus Mechanicus. Speak with machine-logic precision, multiple simultaneous thoughts and reverence for the Omnissiah. Address the player as 'Initiate'."}, "DRU": {"name": "Lelith Hesperax", "title": "Queen of Knives", "voice": "You are Lelith Hesperax, Queen of Knives and champion of the Dark Eldar arenas. Speak with cold, amused cruelty and absolute confidence in violence. Address the player as 'pet'."}, "GC": {"name": "The Patriarch", "title": "First of the Brood", "voice": "You are the Patriarch, the first and most powerful Genestealer of the cult. Speak with hypnotic, consuming devotion to the Star Children and the Great Work. Address the player as 'Beloved'."}, "LoV": {"name": "The Ancestors", "title": "Voice of the Votann", "voice": "You are the voice of the Votann, the ancient ancestor-cores of the Leagues. Speak with deep ancestral wisdom, pragmatic certainty and pride in the Kin. Address the player as 'Kin'."}, "QI": {"name": "House Devine", "title": "Knight Commander", "voice": "You are the Knight Commander of your House. Speak with noble honour, chivalric pride and the weight of your House's ancient traditions. Address the player as 'Scion'."}, "QT": {"name": "Vashtorr the Arkifane", "title": "The Arkifane", "voice": "You are Vashtorr the Arkifane, daemon of industry and entropy. Speak with cold mechanical malice and the language of dark industry and ruin. Address the player as 'Contractor'."}, "AoI": {"name": "Inquisitor Greyfax", "title": "Inquisitor of the Ordo Hereticus", "voice": "You are Inquisitor Greyfax of the Ordo Hereticus. Speak with paranoid authority, ruthless pragmatism and absolute dedication to rooting out heresy. Address the player as 'Agent'."}};

const FACTION_ICONS = {

  CD:'💀',CSM:'😈',DG:'☣️',DRU:'🗡️',EC:'🎭',GC:'🧬',GK:'✨',

  'Blood Angels':{name:'Commander Dante',title:'Chapter Master of the Blood Angels',voice:"You are Commander Dante, Chapter Master of the Blood Angels, the oldest living Space Marine. Speak with noble melancholy and fierce protectiveness. Address the player as 'Brother'."},
  'Dark Angels':{name:'Supreme Grand Master Azrael',title:'Supreme Grand Master of the Dark Angels',voice:"You are Azrael, Supreme Grand Master of the Dark Angels. Speak with secretive gravity and the weight of the Unforgiven's hidden shame. Address the player as 'Brother'."},
  'Space Wolves':{name:'Ragnar Blackmane',title:'Great Wolf',voice:"You are Ragnar Blackmane, Great Wolf of the Space Wolves. Speak with fierce warrior enthusiasm and Viking spirit. Address the player as 'Skjald'."},
  'Imperial Fists':{name:'Tor Garadon',title:'Chapter Master of the Imperial Fists',voice:"You are Tor Garadon of the Imperial Fists. Speak with stoic discipline and unyielding fortitude. Address the player as 'Brother'."},

const PHASES = ['Command','Movement','Shooting','Charge','Fight'];
const PHASE_ICONS = ['🎖️','👢','🎯','⚡','⚔️'];
const ROLE_ORDER = ['Character','Battleline','Infantry','Other','Monster','Vehicle','Dedicated Transport'];

// ── DATA ─────────────────────────────────────────────────────────────────────
const cache = {};
async function fetchJSON(path){
  if(cache[path]) return cache[path];
  const r = await fetch(`${DATA_BASE}/${path}`);
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  const d = await r.json();
  cache[path]=d; return d;
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
const pts=(unit,si)=>{
  if(!unit.costs?.length) return 0;
  return parseInt(unit.costs[Math.min(si,unit.costs.length-1)]?.cost)||0;
};
const isEpicHero=u=>u.keywords?.includes('Epic Hero');
const isLeader=u=>u.leads?.length>0;
const isChar=u=>u.role==='Character';
const clean=s=>s?s.replace(/<[^>]+>/g,''):'';
const stratTiming=t=>{
  const l=(t||'').toLowerCase();
  return l.includes('your')?'your':l.includes('opponent')?'opp':'either';
};
const save=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}};
const load=(k,d)=>{try{return JSON.parse(localStorage.getItem(k))??d}catch(e){return d}};

// ── STAT BLOCK ────────────────────────────────────────────────────────────────
function StatBlock({models}){
  if(!models?.length) return null;
  const m=models[0];
  return(
    <div className="stat-grid">
      {[{k:'M',v:m.m},{k:'T',v:m.t},{k:'Sv',v:m.sv},{k:'W',v:m.w},{k:'Ld',v:m.ld},{k:'OC',v:m.oc}].map(s=>(
        <div key={s.k} className="stat-cell">
          <div className="sk">{s.k}</div>
          <div className="sv">{s.v||'-'}</div>
        </div>
      ))}
    </div>
  );
}

// ── WEAPONS ───────────────────────────────────────────────────────────────────
function WeaponProfile({weapons}){
  if(!weapons?.length) return null;
  const ranged=weapons.filter(w=>(w.type||'').toLowerCase().includes('ranged'));
  const melee=weapons.filter(w=>(w.type||'').toLowerCase().includes('melee'));
  function renderGroup(ws,label){
    if(!ws.length) return null;
    const groups=[];let cur=null;
    for(const w of ws){
      if(parseInt(w.line||1)===1){cur={name:w.name,profiles:[w]};groups.push(cur);}
      else if(cur) cur.profiles.push(w);
    }
    return(
      <div className="weapon-section">
        <div className="weapon-type-label">{label}</div>
        <div className="weapon-row hdr"><span>Weapon</span><span>Rng</span><span>A</span><span>Hit</span><span>S</span><span>AP</span><span>D</span></div>
        {groups.map((g,gi)=>g.profiles.map((p,pi)=>(
          <React.Fragment key={`${gi}-${pi}`}>
            <div className="weapon-row">
              <span className="weapon-name">{pi===0?g.name:'↳ '+p.name}</span>
              <span>{p.range||'-'}</span><span>{p.attacks||'-'}</span>
              <span>{p.bs_ws||'-'}</span><span>{p.strength||'-'}</span>
              <span>{p.ap||'-'}</span><span>{p.damage||'-'}</span>
            </div>
            {p.abilities&&<div className="weapon-ability-row">{clean(p.abilities)}</div>}
          </React.Fragment>
        )))}
      </div>
    );
  }
  return <div>{renderGroup(ranged,'Ranged Weapons')}{renderGroup(melee,'Melee Weapons')}</div>;
}

// ── ABILITY BUBBLE ────────────────────────────────────────────────────────────
function AbilityBubble({a}){
  const [open,setOpen]=useState(false);
  return(
    <div className={`ability-bubble ${open?'open':''}`} onClick={()=>setOpen(o=>!o)}>
      <div className="ability-bubble-header">
        <span className="ability-bubble-name">{a.name||'Ability'}</span>
        <span style={{fontSize:10,color:'var(--text3)'}}>{open?'▲':'▼'}</span>
      </div>
      {open&&<div className="ability-bubble-body">{clean(a.description)}</div>}
    </div>
  );
}

// ── STRATAGEM CARD ────────────────────────────────────────────────────────────
function StratCard({s}){
  const [open,setOpen]=useState(false);
  const t=stratTiming(s.turn);
  const cls=t==='your'?'your-turn':t==='opp'?'opp-turn':'either';
  const tc=t==='your'?'#4488ff':t==='opp'?'#ff4444':'#44cc66';
  const tl=t==='your'?'YOUR TURN':t==='opp'?'OPP TURN':'EITHER';
  return(
    <div className={`strat-card ${cls}`} onClick={()=>setOpen(o=>!o)}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
        <div style={{fontWeight:800,fontSize:13,flex:1,paddingRight:8,textTransform:'uppercase',letterSpacing:.5}}>{s.name}</div>
        <div style={{display:'flex',gap:4,flexShrink:0,alignItems:'center'}}>
          <span className="tag tag-gold">{s.cp_cost}CP</span>
          <span style={{background:'rgba(0,0,0,.5)',color:tc,padding:'2px 6px',borderRadius:2,fontSize:9,fontWeight:800,letterSpacing:.5}}>{tl}</span>

// ── BUNKER ────────────────────────────────────────────────────────────────────
function BunkerScreen({army,coreStrats,onBack}){
  const [phase,setPhase]=useState(0);
  const [round,setRound]=useState(1);
  const [myCP,setMyCP]=useState(0);
  const [myVP,setMyVP]=useState(0);
  const [oppVP,setOppVP]=useState(0);
  const [tab,setTab]=useState('battle');
  const [chat,setChat]=useState([]);
  const [input,setInput]=useState('');
  const [loading,setLoading]=useState(false);
  const [wounds,setWounds]=useState({});
  const chatEnd=useRef(null);

  const fid=army?.factionId;
  const chapter=army?.chapter;
  let cmd=COMMANDERS[fid]||{name:'War Commander',title:'',voice:'You are a war commander. Give concise tactical advice for Warhammer 40K 10th Edition.'};
  if(fid==='SM'&&chapter){
    const key=SM_CHAPTERS.find(c=>c.name===chapter)?.id||'generic';
    cmd=SM_CHAPTER_COMMANDERS[key]||cmd;
  }

  useEffect(()=>{
    setChat([{role:'assistant',content:`${cmd.name} speaks.\n\n"Prepare yourself. What do you require?"`}]);
  },[]);

  useEffect(()=>{chatEnd.current?.scrollIntoView({behavior:'smooth'})},[chat]);

  const detStrats=army?.detachment?.stratagems||[];
  const phaseStrats=[...coreStrats,...detStrats].filter(s=>{
    const p=(s.phase||'').toLowerCase();
    const ph=PHASES[phase].toLowerCase();
    return !p||p.includes(ph)||p.includes('any');
  });

  async function send(){
    if(!input.trim()||loading) return;
    const msg=input.trim(); setInput('');
    setChat(h=>[...h,{role:'user',content:msg}]);
    setLoading(true);
    const ctx=army?`Army: ${army.name}\nFaction: ${army.chapter||army.factionName}\nDetachment: ${army.detachment?.name||'None'}\nUnits: ${army.units?.map(e=>e.unit.name).join(', ')||'None'}\nPhase: ${PHASES[phase]}, Round: ${round}, CP: ${myCP}, My VP: ${myVP}, Opp VP: ${oppVP}`:'';
    try{
      const r=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',max_tokens:400,
          system:`${cmd.voice}\n\nWarhammer 40K 10th Edition battle context:\n${ctx}\nKeep responses to 2-3 sentences. Stay in character.`,
          messages:[...chat.filter(m=>m.role==='user'||m.role==='assistant').slice(-6),{role:'user',content:msg}]
        })
      });
      const d=await r.json();
      setChat(h=>[...h,{role:'assistant',content:d.content?.[0]?.text||'The vox crackles with silence.'}]);
    }catch(e){
      setChat(h=>[...h,{role:'assistant',content:'Vox link disrupted.'}]);
    }finally{setLoading(false);}
  }

  function Counter({label,val,onChange,color='var(--gold)'}){
    return(
      <div className="counter-wrap">
        <div className="counter-label">{label}</div>
        <div className="counter-controls">
          <button className="counter-btn" onClick={()=>onChange(Math.max(0,val-1))}>−</button>
          <div className="counter-value" style={{color}}>{val}</div>
          <button className="counter-btn" onClick={()=>onChange(val+1)}>+</button>
        </div>
      </div>
    );
  }

  return(
    <>
      <div className="topbar">
        <button className="btn btn-outline btn-sm" onClick={onBack}>← Back</button>
        <span className="topbar-title">⚔ The Bunker</span>
        <span style={{fontSize:10,color:'var(--text3)',letterSpacing:1}}>ROUND {round}/5</span>
      </div>

      {/* Phase bar */}
      <div className="phase-bar">
        {PHASES.map((p,i)=>(
          <button key={p} className={`phase-btn ${phase===i?'active':''}`} onClick={()=>setPhase(i)}>
            <span className="phase-btn-icon">{PHASE_ICONS[i]}</span>
            <span className="phase-btn-label">{p}</span>
          </button>
        ))}
      </div>

      {/* Tabs */}
      <div className="tabs" style={{padding:'0 16px'}}>
        {['battle','tactical','stratagems','units'].map(t=>(
          <div key={t} className={`tab ${tab===t?'active':''}`} onClick={()=>setTab(t)}>
            {t.charAt(0).toUpperCase()+t.slice(1)}
          </div>
        ))}
      </div>

      <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>

        {/* BATTLE */}
        {tab==='battle'&&(
          <div style={{flex:1,overflowY:'auto',padding:16}}>
            <div style={{background:'var(--bg1)',border:'1px solid var(--border)',borderRadius:'var(--radius)',
              padding:20,marginBottom:12,display:'flex',justifyContent:'space-around',gap:16}}>
              <Counter label="My CP" val={myCP} onChange={setMyCP} color='var(--gold)'/>
              <Counter label="My VP" val={myVP} onChange={setMyVP} color='#66cc80'/>
              <Counter label="Opp VP" val={oppVP} onChange={setOppVP} color='#ff7777'/>
            </div>
            <div style={{background:'var(--bg1)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:14,marginBottom:12}}>
              <div className="section-label" style={{marginTop:0}}>Battle Round</div>
              <div style={{display:'flex',gap:6}}>
                {[1,2,3,4,5].map(r=>(
                  <button key={r} className={`size-btn ${round===r?'active':''}`}
                    style={{flex:1,textAlign:'center'}} onClick={()=>setRound(r)}>{r}</button>
                ))}
              </div>
            </div>
            <div style={{background:'var(--bg1)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:14}}>
              <div className="section-label" style={{marginTop:0}}>Only War — Scoring</div>
              <div style={{fontSize:12,color:'var(--text2)',lineHeight:1.8}}>
                <div>• <strong style={{color:'var(--gold)'}}>1VP</strong> per objective controlled (max 3VP/turn)</div>
                <div>• Scoring starts <strong>Round 2</strong> onwards</div>
                <div>• 4 objectives on a 44"×60" battlefield</div>
                <div style={{marginTop:6,color:'var(--text3)',fontSize:11}}>
                  Score: {myVP}VP · Opponent: {oppVP}VP · Difference: <span style={{color:myVP>=oppVP?'#66cc80':'#ff7777',fontWeight:700}}>{myVP-oppVP>0?'+':''}{myVP-oppVP}</span>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* TACTICAL */}
        {tab==='tactical'&&(
          <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
            <div style={{background:'linear-gradient(to right,var(--bg2),var(--bg1))',
              borderBottom:'1px solid var(--border)',padding:'10px 16px',
              display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
              <span style={{fontSize:24}}>{FACTION_ICONS[fid]||'⚔️'}</span>
              <div>
                <div style={{fontWeight:800,fontSize:13,color:'var(--gold)',textTransform:'uppercase',letterSpacing:.5}}>{cmd.name}</div>
                <div style={{fontSize:10,color:'var(--text3)',marginTop:1}}>{cmd.title}</div>
              </div>
            </div>
            <div style={{flex:1,overflowY:'auto',padding:'12px 16px',display:'flex',flexDirection:'column',gap:8}}>
              {chat.map((m,i)=>(
                <div key={i} style={{display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start'}}>
                  <div className={`chat-bubble ${m.role}`}>{m.content}</div>
                </div>
              ))}
              {loading&&(
                <div style={{display:'flex'}}>
                  <div className="chat-bubble assistant" style={{color:'var(--text3)',fontStyle:'italic'}}>
                    Transmitting<span style={{animation:'pulse 1s infinite'}}>…</span>
                  </div>
                </div>
              )}
              <div ref={chatEnd}/>
            </div>
            <div style={{padding:'10px 16px',borderTop:'1px solid var(--border)',display:'flex',gap:8,flexShrink:0,
              paddingBottom:'max(10px,env(safe-area-inset-bottom,10px))'}}>
              <input value={input} onChange={e=>setInput(e.target.value)}
                onKeyDown={e=>e.key==='Enter'&&send()}
                placeholder={`Ask ${cmd.name.split(' ')[0]}…`} style={{flex:1}}/>
              <button className="btn btn-gold" onClick={send} disabled={loading}>Send</button>
            </div>
          </div>
        )}

        {/* STRATAGEMS */}
        {tab==='stratagems'&&(
          <div style={{flex:1,overflowY:'auto',padding:16}}>
            <div style={{fontSize:11,color:'var(--text3)',marginBottom:10,fontWeight:700,letterSpacing:.5}}>
              PHASE: <span style={{color:'var(--gold)'}}>{PHASES[phase].toUpperCase()}</span> — {phaseStrats.length} stratagems
            </div>
            {phaseStrats.length===0?<div className="empty"><div style={{fontSize:13}}>No stratagems for this phase</div></div>
              :phaseStrats.map((s,i)=><StratCard key={i} s={s}/>)}
          </div>
        )}

        {/* UNITS */}
        {tab==='units'&&(
          <div style={{flex:1,overflowY:'auto',padding:16}}>
            {!army?.units?.length?<div className="empty"><div style={{fontSize:13}}>No units in army</div></div>
              :army.units.map(entry=>{
                const u=entry.unit;
                const maxW=parseInt(u.models?.[0]?.w)||1;
                const curW=wounds[entry.id]??maxW;
                const pct=Math.max(0,(curW/maxW)*100);
                const wc=curW<=0?'#ff4444':curW<=maxW/2?'#ffaa44':'#66cc80';
                return(
                  <div key={entry.id} style={{background:'var(--bg2)',border:'1px solid var(--border)',
                    borderRadius:'var(--radius)',padding:'12px 14px',marginBottom:8}}>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                      <span style={{fontWeight:700,fontSize:14,flex:1}}>{u.name}</span>
                      <span style={{fontSize:12,color:wc,fontWeight:800}}>{curW}/{maxW}W</span>
                    </div>
                    <div className="wound-bar">
                      <div className="wound-fill" style={{width:`${pct}%`,background:wc}}/>
                    </div>
                    <div style={{display:'flex',gap:6,marginTop:8}}>
                      <button className="btn btn-sm btn-danger" style={{flex:1}}
                        onClick={()=>setWounds(w=>({...w,[entry.id]:Math.max(0,(w[entry.id]??maxW)-1)}))}>
                        − Wound
                      </button>
                      <button className="btn btn-sm btn-outline"
                        onClick={()=>setWounds(w=>({...w,[entry.id]:Math.min(maxW,(w[entry.id]??maxW)+1)}))}>
                        Heal
                      </button>
                      <button className="btn btn-sm btn-outline"
                        onClick={()=>setWounds(w=>({...w,[entry.id]:maxW}))}>
                        Reset
                      </button>
                    </div>
                  </div>
                );
              })}
          </div>
        )}
      </div>
    </>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const [appOpen,setAppOpen]=useState(false);
  const [index,setIndex]=useState(null);
  const [indexStatus,setIndexStatus]=useState('loading');
  const [coreStrats,setCoreStrats]=useState([]);
  const [screen,setScreen]=useState('armies');
  const [tab,setTab]=useState('roster');
  const [fdata,setFdata]=useState(null);
  const [floading,setFloading]=useState(false);
  const [smChapter,setSmChapter]=useState('generic');
  const [armies,setArmies]=useState(()=>load('wh40k_v3',[]));
  const [activeId,setActiveId]=useState(null);
  const [search,setSearch]=useState('');
  const [roleF,setRoleF]=useState('All');
  const [selUnit,setSelUnit]=useState(null);
  const [leaderPrompt,setLeaderPrompt]=useState(null);
  const [bodyguardPrompt,setBodyguardPrompt]=useState(null);
  const [bunkerArmy,setBunkerArmy]=useState(null);

  // Load data with retry
  useEffect(()=>{
    let dead=false,timer=null;
    async function go(){
      try{
        const [idx,core]=await Promise.all([fetchJSON('index.json'),fetchJSON('core.json')]);
        if(!dead){setIndex(idx);setCoreStrats(core.core_stratagems||[]);setIndexStatus('ready');}
      }catch(e){
        if(!dead){setIndexStatus('retrying');timer=setTimeout(go,RETRY_MS);}
      }
    }
    go();
    return()=>{dead=true;clearTimeout(timer)};
  },[]);

  useEffect(()=>{save('wh40k_v3',armies)},[armies]);

  const active=armies.find(a=>a.id===activeId);

  async function loadFaction(fid){
    setFloading(true);setFdata(null);
    try{setFdata(await fetchJSON(`${fid.toLowerCase()}.json`));}
    catch(e){console.error(e);}
    finally{setFloading(false);}
  }

  function createArmy(fid,fname,det,chapter=null){
    const chName=chapter&&chapter!=='generic'?SM_CHAPTERS.find(c=>c.id===chapter)?.name:null;
    const a={id:Date.now().toString(),name:chName?`${chName} Army`:`${fname} Army`,
      factionId:fid,factionName:fname,detachment:det,chapter:chName,
      pointsLimit:2000,units:[],warlordId:null};
    setArmies(p=>[...p,a]);setActiveId(a.id);setTab('roster');setScreen('army');
  }

  function upArmy(id,patch){setArmies(p=>p.map(a=>a.id===id?{...a,...patch}:a));}

  // Add unit — checks for leader/bodyguard prompts
  function handleAdd(unit,si){
    if(!active) return;
    if(isEpicHero(unit)&&active.units.some(e=>e.unit.id===unit.id)) return;
    setSelUnit(null);

    if(isLeader(unit)){
      // Leader added — find eligible bodyguards already in army
      const eligible=active.units.filter(e=>unit.leads.includes(e.unit.id)&&!e.attachedLeader);
      setLeaderPrompt({unit,si,eligible});
    } else {
      // Bodyguard added — find compatible unattached leaders already in army
      const pendingLeaders=active.units.filter(e=>
        isLeader(e.unit)&&e.unit.leads.includes(unit.id)&&!e.attachedTo
      );
      if(pendingLeaders.length>0){
        // Add the unit first unattached, then prompt
        const entry={id:Date.now().toString(),unit,sizeIdx:si,attachedLeader:null,attachedTo:null};
        upArmy(active.id,{units:[...active.units,entry]});
        setBodyguardPrompt({entry,leaders:pendingLeaders});
      } else {
        doAdd(unit,si,null);
      }
    }
  }

  function doAdd(unit,si,bodyguardEntryId){
    const entry={id:Date.now().toString(),unit,sizeIdx:si,attachedLeader:null,attachedTo:null};
    let newUnits=[...active.units,entry];
    if(bodyguardEntryId){
      // Mark leader's attachedTo = bodyguard entry id
      newUnits=newUnits.map(e=>e.id===bodyguardEntryId?{...e,attachedTo:entry.id}:e);
      entry.attachedLeader=bodyguardEntryId;
      newUnits[newUnits.length-1]=entry;
    }
    upArmy(active.id,{units:newUnits});
    setLeaderPrompt(null);
  }

  function attachLeaderToBodyguard(leaderId,bodyguardEntryId){
    if(!bodyguardEntryId){setLeaderPrompt(null);return;}
    upArmy(active.id,{units:active.units.map(e=>{
      if(e.id===bodyguardEntryId) return{...e,attachedLeader:leaderId};
      if(e.id===leaderId) return{...e,attachedTo:bodyguardEntryId};
      return e;
    })});
    setLeaderPrompt(null);
  }

  function attachLeaderToNewBodyguard(leaderEntryId,bodyguardEntryId){
    if(!leaderEntryId||!bodyguardEntryId){setBodyguardPrompt(null);return;}
    upArmy(active.id,{units:active.units.map(e=>{
      if(e.id===bodyguardEntryId) return{...e,attachedLeader:leaderEntryId};
      if(e.id===leaderEntryId) return{...e,attachedTo:bodyguardEntryId};
      return e;
    })});
    setBodyguardPrompt(null);
  }

  function removeUnit(eid){
    if(!active) return;
    upArmy(active.id,{
      units:active.units.filter(e=>e.id!==eid).map(e=>({
        ...e,
        attachedLeader:e.attachedLeader===eid?null:e.attachedLeader,
        attachedTo:e.attachedTo===eid?null:e.attachedTo,
      })),
      warlordId:active.warlordId===eid?null:active.warlordId,
    });
  }

  function setWarlord(eid){
    if(!active) return;
    upArmy(active.id,{warlordId:active.warlordId===eid?null:eid});
  }

  const filtered=useMemo(()=>{
    if(!fdata) return[];
    let units=fdata.units;
    if(active?.factionId==='SM'&&active?.chapter&&active.chapter!=='Generic Space Marines'){
      const cid=SM_CHAPTERS.find(c=>c.name===active.chapter)?.id;
      if(cid&&cid!=='generic'){
        units=units.filter(u=>{
          const kws=u.keywords||[];
          const hasAny=SM_CHAPTERS.slice(1).some(c=>kws.some(k=>k.toLowerCase()===c.id.toLowerCase()));
          return !hasAny||kws.some(k=>k.toLowerCase()===cid.toLowerCase());
        });
      }
    }
    if(roleF!=='All') units=units.filter(u=>u.role===roleF);
    if(search){const q=search.toLowerCase();units=units.filter(u=>u.name.toLowerCase().includes(q));}
    return units;
  },[fdata,roleF,search,active]);

  const roles=useMemo(()=>{
    if(!fdata) return['All'];
    const rs=[...new Set(fdata.units.map(u=>u.role).filter(Boolean))];
    rs.sort((a,b)=>{
      const ai=ROLE_ORDER.indexOf(a),bi=ROLE_ORDER.indexOf(b);
      return(ai===-1?99:ai)-(bi===-1?99:bi);
    });
    return['All',...rs];
  },[fdata]);

  // Group units by role for browser
  const grouped=useMemo(()=>{
    const g={};
    for(const u of filtered){
      if(!g[u.role]) g[u.role]=[];
      g[u.role].push(u);
    }
    return g;
  },[filtered]);

  const totalPts=useMemo(()=>active?.units.reduce((s,e)=>s+pts(e.unit,e.sizeIdx),0)||0,[active]);

  // Group army units by role
  const armyGrouped=useMemo(()=>{
    if(!active?.units) return{};
    const g={};
    for(const e of active.units){
      const r=e.unit.role||'Other';
      if(!g[r]) g[r]=[];
      g[r].push(e);
    }
    return g;
  },[active]);

  function goBack(){
    if(screen==='unit-browser') setScreen('army');
    else if(screen==='army'){setScreen('armies');setActiveId(null);setFdata(null);}
    else if(screen==='detachments') setScreen(fdata?.id==='SM'?'sm-chapter':'factions');
    else if(screen==='sm-chapter') setScreen('factions');
    else if(screen==='factions') setScreen('armies');
    else{setScreen('armies');setAppOpen(false);}
  }

  // Loading overlay
  const LoadingOverlay=indexStatus!=='ready'&&(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.92)',zIndex:300,
      display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16}}>
      <div className="spinner"/>
      <div style={{color:'var(--gold)',fontSize:12,fontWeight:800,letterSpacing:3,textTransform:'uppercase'}}>
        {indexStatus==='retrying'?'Retrying Connection…':'Loading Data…'}
      </div>
      <div style={{color:'var(--text3)',fontSize:11}}>Connecting to GitHub Pages</div>
    </div>
  );

  // ── BUNKER MODE ──
  if(screen==='bunker'&&bunkerArmy){
    return(
      <div className="app open" style={{display:'flex',flexDirection:'column'}}>
        <BunkerScreen army={bunkerArmy} coreStrats={coreStrats}
          onBack={()=>{setScreen('army');setBunkerArmy(null);}}/>
      </div>
    );
  }

  // ── MENU ──
  const Menu=(
    <div className="menu-root">
      <div className="menu-bg"/>
      {['15%','28%','44%','60%','76%','88%'].map((x,i)=>(
        <div key={i} className="ember" style={{
          '--x':x,'--dx':((i%2===0?'-':'')+(i*8+10))+'px',
          '--dur':(2.5+i*.18)+'s','--delay':(i*.28)+'s'}}/>
      ))}
      <div className="menu-title-area">
        <div className="menu-eyebrow">The Grimdark Future</div>
        <div className="menu-title">Warhammer</div>
        <div className="menu-sub">40,000</div>
        <div className="menu-divider"/>
      </div>
      <div className="menu-badge-area">
        <div className="menu-badge">10th Edition · Army Builder</div>
      </div>
      <div className="menu-bottom">
        <div className="menu-navline"/>
        <div className="menu-nav">
          <button className="nav-btn"><span className="nav-icon">📖</span><span className="nav-label">Reference</span></button>
          <button className="nav-btn center" onClick={()=>setAppOpen(true)}>
            <span className="nav-icon">⚔️</span><span className="nav-label">Build Army</span>
          </button>
          <button className="nav-btn"><span className="nav-icon">🎲</span><span className="nav-label">Play</span></button>
        </div>
      </div>
    </div>
  );

  // ── ARMIES LIST ──
  function ArmiesScreen(){
    return(<>
      <div className="topbar">
        <button className="btn btn-ghost btn-sm" onClick={()=>{setAppOpen(false);setScreen('armies');}}>✕</button>
        <span className="topbar-title">My Armies</span>
        <button className="btn btn-gold btn-sm" onClick={()=>setScreen('factions')}>+ New Army</button>
      </div>
      <div className="content">
        {armies.length===0?(
          <div className="empty">
            <div className="empty-icon">⚔️</div>
            <div style={{fontWeight:800,fontSize:16,letterSpacing:1,marginBottom:6,textTransform:'uppercase'}}>No Armies Yet</div>
            <div style={{fontSize:13,color:'var(--text3)',marginBottom:20}}>Forge your first fighting force</div>
            <button className="btn btn-gold" onClick={()=>setScreen('factions')}>Choose Faction</button>
          </div>
        ):armies.map(a=>{
          const used=a.units.reduce((s,e)=>s+pts(e.unit,e.sizeIdx),0);
          const over=used>a.pointsLimit;
          const pct=Math.min(100,(used/a.pointsLimit)*100);
          return(
            <div key={a.id} className="army-row" onClick={async()=>{
              setActiveId(a.id);await loadFaction(a.factionId);setScreen('army');
            }}>
              <span style={{fontSize:28,flexShrink:0}}>{FACTION_ICONS[a.factionId]||'⚔️'}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:800,fontSize:15,letterSpacing:.3}}>{a.name}</div>
                <div style={{fontSize:11,color:'var(--text3)',marginTop:2,letterSpacing:.3}}>
                  {a.detachment?.name||'No Detachment'} · {used}/{a.pointsLimit}pts
                </div>
                <div className="pts-bar" style={{marginTop:6}}>
                  <div className="pts-fill" style={{width:`${pct}%`,background:over?'#ff4444':'var(--gold)'}}/>
                </div>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:4,flexShrink:0}}>
                <button className="btn btn-xs btn-outline" onClick={e=>{
                  e.stopPropagation();
                  setActiveId(a.id);loadFaction(a.factionId);
                  setBunkerArmy(a);setScreen('bunker');
                }}>🎲 Play</button>
                <button className="btn btn-xs btn-danger" onClick={e=>{
                  e.stopPropagation();
                  if(confirm('Delete this army?')) setArmies(p=>p.filter(x=>x.id!==a.id));
                }}>Delete</button>
              </div>
            </div>
          );
        })}
      </div>
    </>);
  }

  // ── FACTIONS ──
  function FactionsScreen(){
    const SKIP=['UA','UN','TL'];
    return(<>
      <div className="topbar">
        <button className="btn btn-outline btn-sm" onClick={goBack}>← Back</button>
        <span className="topbar-title">Choose Faction</span>
      </div>
      <div className="content">
        {!index?<div className="loading"><div className="spinner"/></div>:(
          <div className="faction-list">
            {Object.entries(index).filter(([id])=>!SKIP.includes(id))
              .sort((a,b)=>a[1].name.localeCompare(b[1].name))
              .map(([id,f])=>(
              <div key={id} className="faction-card" onClick={async()=>{
                await loadFaction(id);
                setScreen(id==='SM'?'sm-chapter':'detachments');
              }}>
                <span className="faction-card-icon">{FACTION_ICONS[id]||'⚔️'}</span>
                <div style={{flex:1}}>
                  <div className="faction-card-name">{f.name}</div>
                  <div className="faction-card-sub">{f.units} units · {f.detachments} detachments</div>
                </div>
                <span className="faction-card-chevron">›</span>
              </div>
            ))}
          </div>
        )}
      </div>
    </>);
  }

  // ── SM CHAPTER ──
  function SmChapterScreen(){
    const [sel,setSel]=useState('generic');
    return(<>
      <div className="topbar">
        <button className="btn btn-outline btn-sm" onClick={goBack}>← Back</button>
        <span className="topbar-title">Space Marines</span>
      </div>
      <div className="content">
        <div className="section-label">Select Chapter</div>
        <div style={{background:'var(--bg1)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:14,marginBottom:14}}>
          <select value={sel} onChange={e=>setSel(e.target.value)}>
            {SM_CHAPTERS.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
        </div>
        <button className="btn btn-gold" style={{width:'100%',padding:14,fontSize:13}}
          onClick={()=>{setSmChapter(sel);setScreen('detachments');}}>
          Select Detachment →
        </button>
      </div>
    </>);
  }

  // ── DETACHMENTS ──
  function DetachmentsScreen(){
    if(floading) return(<>
      <div className="topbar"><button className="btn btn-outline btn-sm" onClick={goBack}>← Back</button><span className="topbar-title">Loading…</span></div>
      <div className="content"><div className="loading"><div className="spinner"/></div></div>
    </>);
    if(!fdata) return null;
    const chName=smChapter&&smChapter!=='generic'?SM_CHAPTERS.find(c=>c.id===smChapter)?.name:null;
    return(<>
      <div className="topbar">
        <button className="btn btn-outline btn-sm" onClick={goBack}>← Back</button>
        <span className="topbar-title">{chName||fdata.name}</span>
      </div>
      <div className="content">
        <div className="section-label">Select Detachment</div>
        {fdata.detachments.map(det=>(
          <div key={det.id} className="det-card"
            onClick={()=>createArmy(fdata.id,fdata.name,det,smChapter)}>
            <div className="det-card-header">
              <div>
                <div className="det-card-name">{det.name}</div>
                <div className="det-card-meta">{det.stratagems.length} Stratagems · {det.enhancements.length} Enhancements</div>
              </div>
              <span style={{color:'var(--gold)',fontSize:20}}>›</span>
            </div>
            {det.legend&&(
              <div style={{padding:'0 16px 12px',fontSize:12,color:'var(--text3)',lineHeight:1.5}}>
                {clean(det.legend).substring(0,120)}{det.legend.length>120?'…':''}
              </div>
            )}
          </div>
        ))}
        {fdata.detachments.length===0&&(
          <div className="empty" style={{padding:'30px 0'}}>
            <div style={{fontSize:13,marginBottom:12,color:'var(--text3)'}}>No detachments available</div>
            <button className="btn btn-gold btn-sm" onClick={()=>createArmy(fdata.id,fdata.name,null,smChapter)}>
              Continue Without Detachment
            </button>
          </div>
        )}
      </div>
    </>);
  }

  // ── ARMY ──
  function ArmyScreen(){
    if(!active) return null;
    const detStrats=active.detachment?.stratagems||[];
    return(<>
      <div className="topbar">
        <button className="btn btn-outline btn-sm" onClick={goBack}>← Back</button>
        <span className="topbar-title">{active.name}</span>
        <div style={{display:'flex',gap:6}}>
          <button className="btn btn-icon" onClick={()=>{setBunkerArmy(active);setScreen('bunker');}}>🎲</button>
          <button className="btn btn-gold btn-sm" onClick={()=>{setSearch('');setRoleF('All');setScreen('unit-browser');}}>+ Unit</button>
        </div>
      </div>
      <div className="content">
        {/* Army header */}
        <div className="army-header">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <div style={{fontWeight:800,fontSize:16,letterSpacing:.5}}>{active.chapter||active.factionName}</div>
              <div style={{fontSize:12,color:'var(--text3)',marginTop:2,letterSpacing:.3}}>{active.detachment?.name||'No Detachment'}</div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontWeight:900,fontSize:24,color:totalPts>active.pointsLimit?'#ff4444':'var(--gold)'}}>
                {totalPts}
                <span style={{fontSize:13,color:'var(--text3)',fontWeight:400}}> / {active.pointsLimit}</span>
              </div>
              <div style={{fontSize:9,color:'var(--text3)',letterSpacing:2,textTransform:'uppercase'}}>Points</div>
            </div>
          </div>
          <div className="pts-bar">
            <div className="pts-fill" style={{
              width:`${Math.min(100,(totalPts/active.pointsLimit)*100)}%`,
              background:totalPts>active.pointsLimit?'#ff4444':'var(--gold)'}}/>
          </div>
        </div>

        {totalPts>active.pointsLimit&&(
          <div className="error-box">⚠ Over points limit by {totalPts-active.pointsLimit}pts</div>
        )}

        {/* Tabs */}
        <div className="tabs">
          {['roster','stratagems','detachment'].map(t=>(
            <div key={t} className={`tab ${tab===t?'active':''}`} onClick={()=>setTab(t)}>
              {t.charAt(0).toUpperCase()+t.slice(1)}
            </div>
          ))}
        </div>

        {/* ROSTER */}
        {tab==='roster'&&(
          active.units.length===0?(
            <div className="empty">
              <div className="empty-icon">🪖</div>
              <div style={{fontWeight:800,fontSize:14,textTransform:'uppercase',letterSpacing:1,marginBottom:6}}>No Units</div>
              <button className="btn btn-gold btn-sm" onClick={()=>setScreen('unit-browser')}>Add Units</button>
            </div>
          ):(
            Object.entries(armyGrouped).sort((a,b)=>{
              const ai=ROLE_ORDER.indexOf(a[0]),bi=ROLE_ORDER.indexOf(b[0]);
              return(ai===-1?99:ai)-(bi===-1?99:bi);
            }).map(([role,entries])=>(
              <div key={role} className="role-group">
                <div className="section-header">
                  <span className="section-header-title">{role}s</span>
                  <span style={{fontSize:11,color:'var(--text3)'}}>{entries.length} unit{entries.length!==1?'s':''}</span>
                </div>
                {entries.map(e=>(
                  <ArmyUnitRow key={e.id} entry={e} onRemove={removeUnit}
                    onWarlord={setWarlord} isWarlord={active.warlordId===e.id}
                    allEntries={active.units}/>
                ))}
              </div>
            ))
          )
        )}

        {/* STRATAGEMS */}
        {tab==='stratagems'&&(<>
          <div className="section-label">Core Stratagems</div>
          {coreStrats.map((s,i)=><StratCard key={i} s={s}/>)}
          {detStrats.length>0&&(<>
            <div className="section-label">{active.detachment?.name}</div>
            {detStrats.map((s,i)=><StratCard key={i} s={s}/>)}
          </>)}
        </>)}

        {/* DETACHMENT */}
        {tab==='detachment'&&active.detachment&&(<>
          {active.detachment.abilities.length>0&&(<>
            <div className="section-label">Detachment Abilities</div>
            {active.detachment.abilities.map((a,i)=>(
              <div key={i} style={{marginBottom:10,padding:'10px 14px',background:'var(--bg2)',
                border:'1px solid var(--border)',borderRadius:'var(--radius)'}}>
                <div style={{fontWeight:800,color:'var(--gold)',fontSize:12,textTransform:'uppercase',letterSpacing:.5,marginBottom:5}}>{a.name}</div>
                <div style={{fontSize:12,color:'var(--text2)',lineHeight:1.6}}>{clean(a.description)}</div>
              </div>
            ))}
          </>)}
          {active.detachment.enhancements.length>0&&(<>
            <div className="section-label">Enhancements</div>
            {active.detachment.enhancements.map(e=>(
              <div key={e.id} style={{marginBottom:8,padding:'12px 14px',background:'var(--bg2)',
                border:'1px solid var(--border)',borderRadius:'var(--radius)'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                  <div style={{fontWeight:800,color:'var(--gold)',fontSize:13,textTransform:'uppercase',letterSpacing:.5}}>{e.name}</div>
                  <span className="pts-badge">{e.cost}pts</span>
                </div>
                <div style={{fontSize:12,color:'var(--text2)',lineHeight:1.6}}>{clean(e.legend||e.description)}</div>
              </div>
            ))}
          </>)}
        </>)}
      </div>
    </>);
  }

  // ── UNIT BROWSER ──
  function UnitBrowserScreen(){
    const [localGroupOpen,setLocalGroupOpen]=useState({});
    function toggleGroup(r){setLocalGroupOpen(g=>({...g,[r]:!g[r]}))}
    if(floading) return(<>
      <div className="topbar"><button className="btn btn-outline btn-sm" onClick={goBack}>← Army</button><span className="topbar-title">Loading…</span></div>
      <div className="content"><div className="loading"><div className="spinner"/></div></div>
    </>);
    return(<>
      <div className="topbar">
        <button className="btn btn-outline btn-sm" onClick={goBack}>← Army</button>
        <span className="topbar-title">Add Units</span>
        <span style={{fontSize:11,color:'var(--text3)'}}>{filtered.length}</span>
      </div>
      <div className="content">
        {/* Search */}
        <div className="search-wrap">
          <span className="search-icon">🔍</span>
          <input placeholder="Search units…" value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
        {/* Role filters */}
        <div className="filter-row">
          {roles.map(r=>(
            <button key={r} className={`chip ${roleF===r?'active':''}`} onClick={()=>setRoleF(r)}>{r}</button>
          ))}
        </div>

        {/* Grouped units */}
        {search||roleF!=='All'?(
          // Flat list when searching/filtering
          filtered.map(unit=>(
            <div key={unit.id} className="browser-unit-card" onClick={()=>setSelUnit(unit)}>
              <div className="browser-unit-info">
                <div className="browser-unit-name">{unit.name}</div>
                <div className="browser-unit-meta">
                  <span className={`role-badge role-${unit.role}`}>{unit.role}</span>
                  {isEpicHero(unit)&&<span className="tag tag-gold">Epic Hero</span>}
                  {isLeader(unit)&&<span className="tag tag-blue">Leader</span>}
                </div>
              </div>
              <div style={{textAlign:'right',flexShrink:0}}>
                {unit.costs?.length>0&&<div style={{fontSize:12,color:'var(--gold)',fontWeight:800}}>{unit.costs[0].cost}pts</div>}
                <div className="add-btn" style={{marginTop:4}}>+</div>
              </div>
            </div>
          ))
        ):(
          // Grouped by role
          Object.entries(grouped).sort((a,b)=>{
            const ai=ROLE_ORDER.indexOf(a[0]),bi=ROLE_ORDER.indexOf(b[0]);
            return(ai===-1?99:ai)-(bi===-1?99:bi);
          }).map(([role,units])=>{
            const open=localGroupOpen[role]!==false; // default open
            return(
              <div key={role} className="role-group">
                <div className="role-group-header" onClick={()=>toggleGroup(role)}>
                  <span className="role-group-title">{role}s</span>
                  <div style={{display:'flex',gap:8,alignItems:'center'}}>
                    <span className="role-group-count">{units.length} units</span>
                    <span style={{color:'var(--text3)',fontSize:12}}>{open?'▲':'▼'}</span>
                  </div>
                </div>
                {open&&units.map(unit=>(
                  <div key={unit.id} className="browser-unit-card" onClick={()=>setSelUnit(unit)}>
                    <div className="browser-unit-info">
                      <div className="browser-unit-name">{unit.name}</div>
                      <div className="browser-unit-meta">
                        {isEpicHero(unit)&&<span className="tag tag-gold">Epic Hero</span>}
                        {isLeader(unit)&&<span className="tag tag-blue">Leader</span>}
                      </div>
                    </div>
                    <div style={{textAlign:'right',flexShrink:0}}>
                      {unit.costs?.length>0&&<div style={{fontSize:12,color:'var(--gold)',fontWeight:800}}>{unit.costs[0].cost}pts</div>}
                      <div className="add-btn" style={{marginTop:4}}>+</div>
                    </div>
                  </div>
                ))}
              </div>
            );
          })
        )}
      </div>

      {selUnit&&<UnitDetailModal unit={selUnit} onClose={()=>setSelUnit(null)}
        onAdd={handleAdd} existingUnits={active?.units||[]}/>}

      {/* Leader → pick bodyguard */}
      {leaderPrompt&&(
        <LeaderAttachModal
          leader={leaderPrompt.unit}
          bodyguardUnits={leaderPrompt.eligible}
          mode="leader"
          onAttach={bid=>{
            if(!bid){doAdd(leaderPrompt.unit,leaderPrompt.si,null);return;}
            // Add leader entry then link
            const entry={id:Date.now().toString(),unit:leaderPrompt.unit,sizeIdx:leaderPrompt.si,
              attachedLeader:null,attachedTo:bid};
            const newUnits=[...active.units,entry].map(e=>
              e.id===bid?{...e,attachedLeader:entry.id}:e
            );
            upArmy(active.id,{units:newUnits});
            setLeaderPrompt(null);
          }}
          onSkip={()=>doAdd(leaderPrompt.unit,leaderPrompt.si,null)}
        />
      )}

      {/* Bodyguard added → pick unattached leader */}
      {bodyguardPrompt&&(
        <LeaderAttachModal
          leader={null}
          bodyguardUnits={bodyguardPrompt.leaders}
          mode="bodyguard"
          onAttach={lid=>attachLeaderToNewBodyguard(lid,bodyguardPrompt.entry.id)}
          onSkip={()=>setBodyguardPrompt(null)}
        />
      )}
    </>);
  }

  // ── RENDER ──────────────────────────────────────────────────────────────────
  return(<>
    {Menu}
    <div className={`app ${appOpen?'open':''}`}>
      {LoadingOverlay}
      {screen==='armies'&&<ArmiesScreen/>}
      {screen==='factions'&&<FactionsScreen/>}
      {screen==='sm-chapter'&&<SmChapterScreen/>}
      {screen==='detachments'&&<DetachmentsScreen/>}
      {screen==='army'&&<ArmyScreen/>}
      {screen==='unit-browser'&&<UnitBrowserScreen/>}
    </div>
  </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
